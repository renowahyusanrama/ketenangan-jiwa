<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>E-Ticket | Ketenangan Jiwa</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link href="https://fonts.cdnfonts.com/css/coolvetica" rel="stylesheet" />

    <style>
      :root {
        --primary: #3b82f6; /* Blue matching header bar roughly */
        --primary-dark: #2563eb;
        --text-dark: #333333;
        --text-muted: #666666;
        --border-color: #dbeafe; /* Light blue border */
        --bg-color: #ffffff;
      }

      body {
        font-family: "Inter", sans-serif;
        background-color: #ffffff;
        color: var(--text-dark);
        margin: 0;
        padding: 20px;
        display: flex;
        justify-content: center;
        min-height: 100vh;
      }

      .container {
        width: 100%;
        max-width: 800px;
        background: #fff;
      }

      /* HEADER */
      .header {
        text-align: center;
        margin-bottom: 20px;
      }
      .header img {
        max-width: 250px;
        height: auto;
      }
      .blue-bar {
        height: 8px;
        background-color: #3775b5; /* Approximate blue from image */
        margin-top: 15px;
        margin-bottom: 10px;
        width: 100%;
      }
      .success-msg {
        font-size: 14px;
        color: var(--text-dark);
        margin-bottom: 30px;
      }

      /* GRID LAYOUT */
      .grid-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      /* BOX STYLES */
      .info-box {
        border: 1px solid #bfdbfe; /* Light blue border */
        border-radius: 12px;
        padding: 25px;
        background-color: #ffffff;
      }
      .box-title {
        color: #3775b5;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 15px; /* Outside the box in image, but let's keep it close */
        margin-top: 0;
      }

      /* Section Titles (outside box) */
      .section-title {
        color: #3775b5;
        font-weight: 700;
        font-size: 18px;
        margin-bottom: 10px;
        display: block;
      }

      /* DATA ROWS */
      .data-row {
        display: flex;
        margin-bottom: 12px;
        font-size: 14px;
      }
      .data-label {
        width: 120px;
        color: var(--text-muted);
        flex-shrink: 0;
      }
      .data-value {
        color: var(--text-dark);
        font-weight: 500;
        flex-grow: 1;
      }

      /* TOTAL SECTION */
      .total-row {
        margin-top: 15px;
        padding-top: 15px;
        border-top: 1px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-weight: 700;
      }
      .total-label {
        color: var(--text-muted);
        font-size: 14px;
      }
      .total-value {
        font-size: 16px;
      }

      /* QR CODE SECTION */
      .qr-section {
        background-color: #dbeafe; /* Light blue bg */
        border-radius: 12px;
        padding: 30px;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
      }
      .qr-box {
        background: white;
        padding: 15px;
        border-radius: 8px;
        margin-bottom: 15px;
      }
      .qr-hint {
        color: var(--text-muted);
        font-size: 12px;
        text-align: center;
      }

      .meta-info {
        font-size: 11px;
        color: var(--text-muted);
        margin-top: 5px;
      }

      /* FOOTER */
      .footer {
        margin-top: 40px;
        border-top: 1px solid #eee;
        padding-top: 20px;
        font-size: 13px;
        color: var(--text-dark);
      }
      .footer-logo img {
        height: 30px;
        margin-bottom: 10px;
      }
      .footer-info {
        line-height: 1.6;
      }
      .footer-row {
        display: flex;
        margin-bottom: 5px;
      }
      .footer-label {
        width: 80px;
        font-weight: 500;
      }

      /* Responsive */
      @media (max-width: 600px) {
        .grid-row {
          grid-template-columns: 1fr;
        }
        body {
          padding: 15px;
        }
      }

      .loading {
        text-align: center;
        padding: 50px;
        color: var(--text-muted);
      }
      .error {
        color: red;
        text-align: center;
        padding: 50px;
      }
    </style>
  </head>
  <body>
    <div class="container" id="mainContainer">
      <div class="loading">Memuat data tiket...</div>
    </div>

    <!-- Template Structure (Hidden initially) -->
    <template id="ticketTemplate">
      <div class="header">
        <a href="index.html">
          <img src="images/logokj.png" alt="Ketenangan Jiwa" />
        </a>
        <div class="blue-bar"></div>
      </div>
      <div class="success-msg">
        Alhamdulillah, pemesanan tiket Anda telah berhasil diproses.
      </div>

      <div class="grid-row">
        <!-- Peminjam -->
        <div>
          <div class="section-title">Informasi Pesanan</div>
          <div class="info-box">
            <div class="data-row">
              <span class="data-label">Nama</span>
              <span class="data-value" id="tName">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Email</span>
              <span class="data-value" id="tEmail">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">No. WhatsApp</span>
              <span class="data-value" id="tPhone">: -</span>
            </div>
          </div>
        </div>

        <!-- Detail Pesanan -->
        <div>
          <div class="section-title">Detail Pesanan</div>
          <div class="info-box">
            <div class="data-row">
              <span class="data-label">Jumlah Tiket</span>
              <span class="data-value">: 1</span>
            </div>
            <div class="data-row">
              <span class="data-label">Tipe Tiket</span>
              <span class="data-value" id="tType">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Harga Tiket</span>
              <span class="data-value" id="tPrice">: -</span>
            </div>
            <div class="total-row">
              <span class="total-label">Total Pembayaran</span>
              <span class="total-value" id="tTotal">Gratis</span>
            </div>
          </div>
          <div class="meta-info">
            Status: <span id="tStatus">PAID</span> | Ref:
            <span id="tRef">-</span>
          </div>
        </div>
      </div>

      <div class="grid-row">
        <!-- Event Info -->
        <div>
          <div class="section-title">Informasi Acara</div>
          <div class="info-box" style="height: calc(100% - 30px)">
            <!-- Adjust height to match QR box visually if needed -->
            <div class="data-row">
              <span class="data-label">Judul Event</span>
              <span class="data-value" id="eTitle">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Pemateri</span>
              <span class="data-value" id="eSpeaker">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Tanggal</span>
              <span class="data-value" id="eDate">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Waktu</span>
              <span class="data-value" id="eTime">: -</span>
            </div>
            <div class="data-row">
              <span class="data-label">Lokasi</span>
              <span class="data-value" id="eLoc">: -</span>
            </div>
          </div>
        </div>

        <!-- QR Code -->
        <div>
          <div class="qr-section">
            <div class="qr-box" id="qrTarget"></div>
            <div class="qr-hint">Gunakan barcode untuk penukaran ticket</div>
          </div>
        </div>
      </div>

      <div class="footer">
        <div class="footer-logo">
          <img
            src="images/logokj.png"
            alt="Ketenangan Jiwa"
            style="height: 25px"
          />
        </div>
        <div class="footer-info">
          <div style="margin-bottom: 10px">
            Jalan Taman Internasional I Blok B8 No. 11<br />
            Sambikerep, Kota Surabaya, Jawa Timur, Indonesia 60219
          </div>
          <div class="footer-row">
            <span class="footer-label">Telepon :</span>
            <span>0882-0176-75614 / 0812-3497-5501</span>
          </div>
          <div class="footer-row">
            <span class="footer-label">Email :</span>
            <span>ketenanganjiwa.id@gmail.com</span>
          </div>
          <div class="footer-row">
            <span class="footer-label">Instagram :</span>
            <span>@ketenanganjiwa.id</span>
          </div>
        </div>
      </div>
    </template>

    <!-- Scripts -->
    <script src="js/vendor/qrcode.min.js"></script>
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
      import {
        getFirestore,
        collection,
        query,
        where,
        getDocs,
        doc,
        getDoc,
        onSnapshot,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

      // Initialize Firebase
      const firebaseConfig = {
        apiKey: "AIzaSyCoa_Ioa-Gp9TnL5eke6fwTkfQGkbWGJBw",
        authDomain: "pengajian-online.firebaseapp.com",
        projectId: "pengajian-online",
        storageBucket: "pengajian-online.firebasestorage.app",
        messagingSenderId: "965180253441",
        appId: "1:965180253441:web:f03f6cb969e422fd7e2700",
        measurementId: "G-YJ81SDXM5E",
      };

      const app = initializeApp(firebaseConfig);
      const db = getFirestore(app);

      import {
        getAuth,
        onAuthStateChanged,
      } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

      const auth = getAuth(app);

      // Formatter
      const formatRupiah = (num) => {
        return new Intl.NumberFormat("id-ID", {
          style: "currency",
          currency: "IDR",
          minimumFractionDigits: 0,
        }).format(num || 0);
      };

      let unsubscribe = null;

      async function loadTicket(user) {
        const params = new URLSearchParams(window.location.search);
        const refParam = params.get("ref");
        const container = document.getElementById("mainContainer");

        if (!refParam) {
          container.innerHTML =
            '<div class="error">Parameter referensi tidak ditemukan.</div>';
          return;
        }

        try {
          const ordersRef = collection(db, "orders");
          let docId = null;

          // 1. Find Document ID (One-time lookup to get ID)
          // Try reference first
          let q = query(
            ordersRef,
            where("reference", "==", refParam),
            where("customer.email", "==", user.email),
          );
          let snap = await getDocs(q);

          if (!snap.empty) {
            docId = snap.docs[0].id;
          } else {
            // Try merchantRef
            q = query(
              ordersRef,
              where("merchantRef", "==", refParam),
              where("customer.email", "==", user.email),
            );
            snap = await getDocs(q);
            if (!snap.empty) docId = snap.docs[0].id;
            else {
              // Try invoiceId
              q = query(
                ordersRef,
                where("invoiceId", "==", refParam),
                where("customer.email", "==", user.email),
              );
              snap = await getDocs(q);
              if (!snap.empty) docId = snap.docs[0].id;
            }
          }

          if (!docId) {
            container.innerHTML =
              '<div class="error">Data pesanan tidak ditemukan atau Anda tidak memiliki akses.</div>';
            return;
          }

          // 2. Realtime Listener
          if (unsubscribe) unsubscribe();

          unsubscribe = onSnapshot(
            doc(db, "orders", docId),
            async (docSnap) => {
              if (!docSnap.exists()) {
                container.innerHTML =
                  '<div class="error">Data pesanan dihapus.</div>';
                return;
              }
              const orderData = docSnap.data();
              const orderId = docSnap.id;

              // Fetch Event Data (One-time fetch is usually enough for static event info)
              let eventData = {};
              if (orderData.eventId) {
                try {
                  const evSnap = await getDoc(
                    doc(db, "events", orderData.eventId),
                  );
                  if (evSnap.exists()) eventData = evSnap.data();
                } catch (e) {
                  console.error(e);
                }
              }

              renderTicket(container, orderData, eventData, orderId);
            },
          );
        } catch (err) {
          console.error(err);
          container.innerHTML = `<div class="error">Terjadi kesalahan: ${err.message}</div>`;
        }
      }

      function renderTicket(container, orderData, eventData, orderId) {
        const template = document.getElementById("ticketTemplate");
        const content = template.content.cloneNode(true);

        content.getElementById("tName").textContent =
          ": " + (orderData.customer?.name || "-");
        content.getElementById("tEmail").textContent =
          ": " + (orderData.customer?.email || "-");
        content.getElementById("tPhone").textContent =
          ": " + (orderData.customer?.phone || "-");

        content.getElementById("tType").textContent =
          ": " + (orderData.ticketType || "REGULAR").toUpperCase();
        const amount = Number(orderData.amount || 0);
        content.getElementById("tPrice").textContent =
          ": " + (amount === 0 ? "Gratis" : formatRupiah(amount));
        content.getElementById("tTotal").textContent =
          amount === 0 ? "Gratis" : formatRupiah(amount);

        let statusText = (orderData.status || "PENDING").toUpperCase();
        let statusColor = "black";

        if (orderData.verified) {
          statusText = "TERPAKAI / CHECKED-IN";
          statusColor = "green";
        } else if (statusText === "PAID") {
          statusColor = "blue";
        } else if (statusText === "PENDING" || statusText === "UNPAID") {
          statusColor = "orange";
        }

        const sEl = content.getElementById("tStatus");
        sEl.textContent = statusText;
        sEl.style.color = statusColor;
        sEl.style.fontWeight = "bold";

        content.getElementById("tRef").textContent =
          orderData.invoiceId || orderData.reference || orderId;

        content.getElementById("eTitle").textContent =
          ": " + (eventData.title || orderData.eventTitle || "-");
        content.getElementById("eSpeaker").textContent =
          ": " + (eventData.speaker || "-");
        content.getElementById("eDate").textContent =
          ": " + (eventData.schedule || eventData.date || "-");
        content.getElementById("eTime").textContent =
          ": " + (eventData.time || "-");
        content.getElementById("eLoc").textContent =
          ": " + (eventData.location || "-");

        const qrValue = orderData.reference || orderId;
        const qrTarget = content.getElementById("qrTarget");

        // Display Success Message if Verified
        if (orderData.verified) {
          const successMsg = content.querySelector(".success-msg");
          if (successMsg) {
            successMsg.innerHTML = `
                    <div style="background-color: #dcfce7; border: 2px solid #22c55e; border-radius: 12px; padding: 20px; text-align: center; color: #15803d; margin-bottom: 20px;">
                        <h3 style="margin: 0 0 10px 0; font-size: 24px;">✅ Check-in Berhasil</h3>
                        <p style="margin: 0;">Tiket ini sudah digunakan.</p>
                        <p style="font-size: 12px; margin-top: 5px; color: #666;">
                           ${orderData.checkedInAt ? new Date(orderData.checkedInAt.seconds * 1000).toLocaleString("id-ID") : "Baru saja"}
                        </p>
                    </div>
                 `;
          }
          // Optional: visual indication on QR
          if (qrTarget) {
            qrTarget.style.opacity = "0.5";
          }
        }

        container.innerHTML = "";
        container.appendChild(content);

        setTimeout(() => {
          const qrBox = document.getElementById("qrTarget");
          if (window.QRCode && qrBox && !qrBox.innerHTML) {
            new QRCode(qrBox, {
              text: qrValue,
              width: 180,
              height: 180,
              colorDark: "#000000",
              colorLight: "#ffffff",
              correctLevel: window.QRCode.CorrectLevel.H,
            });
          }
        }, 50);
      }

      // Check Auth first
      onAuthStateChanged(auth, (user) => {
        if (user) {
          loadTicket(user);
        } else {
          const container = document.getElementById("mainContainer");
          container.innerHTML =
            '<div class="error">Silakan login untuk melihat tiket.</div><div style="text-align:center"><a href="index.html">Ke Beranda</a></div>';
        }
      });
    </script>
  </body>
</html>
